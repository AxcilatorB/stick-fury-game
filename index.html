<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>2 Player Stickman Fighter</title>

  <!-- PIXEL FONT -->
  <link
    href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
    rel="stylesheet"
  />

  <!-- TAILWIND -->
  <link rel="stylesheet" href="output.css" />

  <!-- YOUR CSS -->
  <link rel="stylesheet" href="style.css" />

</head>

<body
  class="overflow-hidden bg-black"
>

  <!-- ==========================
       GAME
  =========================== -->
  <div
    id="game"
    class="w-screen h-screen
           relative overflow-hidden
           bg-cover bg-center"
    style="background-image:url('assets/bg2.png')"
  >

    <!-- ==========================
         PLAYER 1
    =========================== -->
    <div id="player1" class="character"></div>

    <!-- PLAYER 1 INDICATOR -->
<div
  id="p1Indicator"
  class="absolute z-50 pointer-events-none"
>

  <div
    style="
      width:0;
      height:0;

      border-left:12px solid transparent;
      border-right:12px solid transparent;
      border-bottom:20px solid #3b82f6;

      margin:auto;

      filter:
        drop-shadow(0 0 6px #3b82f6);
    "
  ></div>

  <div
    style="
      color:#93c5fd;

      font-family:'Press Start 2P',cursive;

      font-size:10px;

      text-align:center;

      margin-top:4px;

      text-shadow:
        0 0 5px #3b82f6;
    "
  >
    1P
  </div>

</div>

    <!-- ==========================
         PLAYER 2
    =========================== -->
    <div id="player2" class="character"></div>
    <!-- PLAYER 2 INDICATOR -->
<div
  id="p2Indicator"
  class="absolute z-50 pointer-events-none"
>

  <div
    style="
      width:0;
      height:0;

      border-left:12px solid transparent;
      border-right:12px solid transparent;
      border-bottom:20px solid #ef4444;

      margin:auto;

      filter:
        drop-shadow(0 0 6px #ef4444);
    "
  ></div>

  <div
    style="
      color:#fca5a5;

      font-family:'Press Start 2P',cursive;

      font-size:10px;

      text-align:center;

      margin-top:4px;

      text-shadow:
        0 0 5px #ef4444;
    "
  >
    2P
  </div>

</div>

    <!-- ==========================
         FLOOR
    =========================== -->
    <div
      class="absolute bottom-0
             w-full h-32
             bg-black/10"
    ></div>

    <!-- ==========================
         PLAYER 1 HP
    =========================== -->
    <div
      class="absolute top-5 left-5
             w-[300px] h-6
             border-2 border-white
             bg-zinc-700
             z-40"
    >

      <div
        id="p1HP"
        class="h-full bg-red-500 duration-200"
        style="width:100%;"
      ></div>

    </div>

    <!-- ==========================
         PLAYER 2 HP
    =========================== -->
    <div
      class="absolute top-5 right-5
             w-[300px] h-6
             border-2 border-white
             bg-zinc-700
             z-40"
    >

      <div
        id="p2HP"
        class="h-full bg-red-500 duration-200"
        style="width:100%;"
      ></div>

    </div>

    <!-- ==========================
         MENU BUTTON
    =========================== -->
    <button
      id="menuBtn"
      class="absolute top-5 left-5 mt-10
             bg-black/60
             border border-cyan-300
             text-cyan-200
             px-4 py-2
             rounded-lg
             z-50"
      style="font-family:'Press Start 2P',cursive;"
    >
      Hide Controls
    </button>

    <!-- ==========================
         CONTROLS MENU
    =========================== -->
    <div
      id="controlsMenu"
      class="absolute top-24 left-5
             text-white leading-8
             bg-black/50
             p-4 rounded-xl
             backdrop-blur-sm
             border border-cyan-300
             z-40"
      style="
        font-family:'Press Start 2P',cursive;
        font-size:10px;
      "
    >

      <div class="mb-4">
        PLAYER 1
      </div>

      A/D = MOVE<br>
      W = JUMP<br>
      F = PUNCH<br>
      G = KICK<br>
      T = SPECIAL<br>
      R = BLOCK<br><br>

      <div class="mb-4">
        PLAYER 2
      </div>

      ← → = MOVE<br>
      ↑ = JUMP<br>
      , = PUNCH<br>
      . = KICK<br>
      P = SPECIAL<br>
      / = BLOCK

    </div>

    <!-- ==========================
         ROUND TEXT
    =========================== -->
    <div
      id="roundText"
      class="absolute top-5 left-1/2
             -translate-x-1/2
             text-cyan-200
             text-xl
             font-bold
             z-40"
      style="
        font-family:'Press Start 2P',cursive;
      "
    >
      ROUND 1
    </div>

    <!-- ==========================
         WINNER TEXT
    =========================== -->
    <div
      id="winnerText"
      class="absolute top-1/2 left-1/2
             -translate-x-1/2
             -translate-y-1/2
             text-white
             text-5xl
             hidden
             z-50 text-center"
      style="
        font-family:'Press Start 2P',cursive;
        text-shadow:
          0 0 10px cyan,
          0 0 20px cyan;
      "
    ></div>

  </div>

<!-- ==========================
     START SCREEN
=========================== -->
<div
  id="startScreen"
  style="
    position:fixed;
    inset:0;

    z-index:9999;

    display:flex;
    flex-direction:column;

    align-items:center;
    justify-content:center;

    background:
      linear-gradient(
        rgba(0,0,0,0.45),
        rgba(0,0,0,0.75)
      ),
      url('assets/bg2.png');

    background-size:cover;
    background-position:center;
  "
>

  <!-- PANEL -->
  <div
    style="
      background:
        rgba(0,0,0,0.65);

      border:
        2px solid #d4af37;

      padding:
        50px 70px;

      border-radius:
        16px;

      backdrop-filter:
        blur(6px);

      box-shadow:
        0 0 25px rgba(255,215,0,0.25);

      text-align:center;
    "
  >

    <!-- TITLE -->
    <h1
      style="
        color:#f5d76e;

        font-size:58px;

        line-height:85px;

        margin-bottom:45px;

        font-family:
        'Press Start 2P',
        cursive;

        text-shadow:
          0 0 10px rgba(255,215,0,0.5);
      "
    >
      STICK<br>
      FURY
    </h1>

    <!-- SUBTEXT -->
    <p
      style="
        color:#ddd;

        margin-bottom:40px;

        font-size:12px;

        line-height:24px;

        font-family:
        'Press Start 2P',
        cursive;
      "
    >
      ENTER THE ARENA<br>
      DEFEAT YOUR OPPONENT
    </p>

    <!-- PLAY BUTTON -->
    <button
      id="startBtn"
      style="
        background:
          linear-gradient(
            to bottom,
            #b22222,
            #7a1010
          );

        color:white;

        border:
          2px solid #f5d76e;

        padding:
          18px 45px;

        font-size:18px;

        cursor:pointer;

        border-radius:10px;

        font-family:
        'Press Start 2P',
        cursive;

        transition:0.2s;
      "

      onmouseover="
        this.style.transform='scale(1.05)';
        this.style.boxShadow='0 0 20px rgba(255,215,0,0.5)';
      "

      onmouseout="
        this.style.transform='scale(1)';
        this.style.boxShadow='none';
      "
    >
      PLAY
    </button>

  </div>

</div>

  <!-- ==========================
     END SCREEN
=========================== -->
<div
  id="endScreen"
  style="
    position:fixed;
    inset:0;

    z-index:10000;

    display:none;
    flex-direction:column;

    align-items:center;
    justify-content:center;

    background:
      linear-gradient(
        rgba(0,0,0,0.55),
        rgba(0,0,0,0.85)
      ),
      url('assets/bg2.png');

    background-size:cover;
    background-position:center;
  "
>

  <!-- PANEL -->
<div
  style="
    background:
      rgba(0,0,0,0.72);

    border:
      2px solid #d4af37;

    padding:
      60px 80px;

    border-radius:
      18px;

    backdrop-filter:
      blur(8px);

    box-shadow:
      0 0 30px rgba(255,215,0,0.22);

    text-align:center;

    min-width:500px;
  "
>

  <!-- WINNER -->
  <h1
    id="endWinner"
    style="
      color:#f5d76e;

      font-size:52px;

      line-height:80px;

      margin-bottom:40px;

      font-family:
      'Press Start 2P',
      cursive;

      text-shadow:
        0 0 12px rgba(255,215,0,0.4);
    "
  >
    PLAYER 1<br>
    WINS
  </h1>

  <!-- SUBTEXT -->
  <p
    style="
      color:#ddd;

      margin-bottom:50px;

      font-size:12px;

      line-height:24px;

      font-family:
      'Press Start 2P',
      cursive;
    "
  >
    THE MATCH HAS ENDED
  </p>

  <!-- RETRY BUTTON -->
  <button
    id="retryBtn"

    style="
      background:
        linear-gradient(
          to bottom,
          #b22222,
          #7a1010
        );

      color:white;

      border:
        3px solid #f5d76e;

      padding:
        22px 60px;

      font-size:20px;

      cursor:pointer;

      border-radius:12px;

      font-family:
        'Press Start 2P',
        cursive;

      box-shadow:
        0 0 15px rgba(255,215,0,0.3);

      transition:0.2s;

      display:inline-block;
    "

    onmouseover="
      this.style.transform='scale(1.08)';
      this.style.boxShadow='0 0 25px rgba(255,215,0,0.6)';
    "

    onmouseout="
      this.style.transform='scale(1)';
      this.style.boxShadow='0 0 15px rgba(255,215,0,0.3)';
    "
  >
    RETRY
  </button>

</div>

</div>

  <!-- SCRIPT -->
  <script src="script.js"></script>

</body>
</html>
