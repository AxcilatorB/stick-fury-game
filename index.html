<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Stick Fury</title>

  <!-- PIXEL FONT -->
  <link
    href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
    rel="stylesheet"
  />

  <!-- TAILWIND -->
  <link rel="stylesheet" href="output.css" />

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />

</head>

<body class="overflow-hidden bg-black">

  <!-- GAME -->
  <div
    id="game"
    class="w-screen h-screen
           relative overflow-hidden
           bg-cover bg-center"
    style="background-image:url('assets/bg2.png')"
  >

    <!-- PLAYERS -->
    <div id="player1" class="character"></div>
    <div id="player2" class="character"></div>

    <!-- INDICATORS -->
    <div id="p1Indicator" class="playerIndicator blueIndicator">
      <div class="indicatorArrow"></div>
      <div class="indicatorText">1P</div>
    </div>

    <div id="p2Indicator" class="playerIndicator redIndicator">
      <div class="indicatorArrow"></div>
      <div class="indicatorText">2P</div>
    </div>

    <!-- FLOOR -->
    <div
      class="absolute bottom-0
             w-full h-32
             bg-black/10"
    ></div>

    <!-- HP -->
    <div class="hpContainer left-5">
      <div id="p1HP" class="hpBar"></div>
    </div>

    <div class="hpContainer right-5">
      <div id="p2HP" class="hpBar"></div>
    </div>

    <!-- MENU BUTTON -->
    <button id="menuBtn" class="menuBtn">
      Hide Controls
    </button>

    <!-- CONTROLS -->
    <div id="controlsMenu" class="controlsMenu">

      <div class="mb-4">
        PLAYER 1
      </div>

      A/D = MOVE<br>
      W = JUMP<br>
      F = PUNCH<br>
      G = KICK<br>
      T = SPECIAL<br>
      R = BLOCK<br><br>

      <div class="mb-4">
        PLAYER 2
      </div>

      ← → = MOVE<br>
      ↑ = JUMP<br>
      , = PUNCH<br>
      . = KICK<br>
      P = SPECIAL<br>
      / = BLOCK

    </div>

    <!-- ROUND -->
    <div id="roundText" class="roundText">
      ROUND 1
    </div>

    <!-- WINNER -->
    <div id="winnerText" class="winnerText hidden"></div>

  </div>

  <!-- START SCREEN -->
  <div id="startScreen" class="fullscreenMenu">

    <div class="menuPanel">

      <h1 class="titleText">
        STICK<br>
        FURY
      </h1>

      <p class="subText">
        ENTER THE ARENA<br>
        DEFEAT YOUR OPPONENT
      </p>

      <button id="startBtn" class="mainButton">
        PLAY
      </button>

    </div>

  </div>

  <!-- END SCREEN -->
  <div id="endScreen" class="fullscreenMenu" style="display:none;">

    <div class="menuPanel">

      <h1 id="endWinner" class="titleText">
        PLAYER 1<br>
        WINS
      </h1>

      <p class="subText">
        THE MATCH HAS ENDED
      </p>

      <button id="retryBtn" class="mainButton">
        RETRY
      </button>

    </div>

  </div>

  <!-- SCRIPTS -->
  <script src="content.js"></script>
  <script src="combat.js"></script>
  <script src="ui.js"></script>
  <script src="script.js"></script>

</body>
</html>
